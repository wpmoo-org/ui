<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moo UI Button</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../moo_ui/static/src/tokens/tokens.css" rel="stylesheet">
  <link href="../../moo_ui/static/src/components/button/button.css" rel="stylesheet">
</head>
<body class="moo-ui p-4">
  <main class="container d-grid gap-4">
    <section class="d-flex flex-wrap align-items-center gap-2" aria-label="Button variants">
      <button type="button" class="btn btn-primary">Default</button>
      <button type="button" class="btn btn-outline-secondary">Outline</button>
      <button type="button" class="btn btn-ghost">Ghost</button>
      <button type="button" class="btn btn-danger">Destructive</button>
      <button type="button" class="btn btn-secondary">Secondary</button>
      <button type="button" class="btn btn-link">Link</button>
    </section>

    <section class="d-flex flex-wrap align-items-center gap-2" aria-label="Button sizes">
      <button type="button" class="btn btn-primary btn-xs">Extra small</button>
      <button type="button" class="btn btn-primary btn-sm">Small</button>
      <button type="button" class="btn btn-primary">Default</button>
      <button type="button" class="btn btn-primary btn-lg">Large</button>
      <button type="button" class="btn btn-primary btn-icon" aria-label="Add item">+</button>
      <button type="button" class="btn btn-primary btn-icon-xs" aria-label="Add item">+</button>
      <button type="button" class="btn btn-primary btn-icon-sm" aria-label="Add item">+</button>
      <button type="button" class="btn btn-primary btn-icon-lg" aria-label="Add item">+</button>
    </section>

    <section class="d-flex flex-wrap align-items-center gap-2" aria-label="Button states">
      <button type="button" class="btn btn-primary" disabled>Disabled</button>
      <button type="button" class="btn btn-outline-secondary rounded-pill">Rounded</button>
      <button type="button" class="btn btn-primary">
        <span data-icon="inline-start" aria-hidden="true">+</span>
        Create
      </button>
      <button type="button" class="btn btn-primary">
        Continue
        <span data-icon="inline-end" aria-hidden="true">-></span>
      </button>
    </section>

    <section class="d-flex flex-wrap align-items-center gap-2" dir="rtl" aria-label="RTL buttons">
      <button type="button" class="btn btn-primary">ارسال</button>
      <button type="button" class="btn btn-outline-secondary">مراجعة</button>
    </section>
  </main>
</body>
</html>
