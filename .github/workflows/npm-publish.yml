name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.5"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run contract tests
        run: python -m unittest discover -s tests -v

      - name: Build catalog
        run: python build.py

      - name: Set up Node for npm
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Check package version
        id: package
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] && [ "${tag}" != "v${version}" ]; then
            echo "Tag ${tag} does not match package version v${version}."
            exit 1
          fi
          if npm view "${name}@${version}" version --silent >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${name}@${version} is already published; skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package contents
        if: steps.package.outputs.published == 'false'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.package.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release notes
        if: startsWith(github.ref_name, 'v')
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping."
          else
            gh release create "${tag}" --title "${tag}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
